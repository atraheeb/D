<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مغير أبعاد الصور - نسخة احترافية</title>
<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: #0a0a23;
    overflow-x:hidden;
}
canvas#starsCanvas{
    position: fixed;
    top:0;
    left:0;
    z-index:-1;
}
.resizer {
    background: rgba(255,255,255,0.95);
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 25px rgba(0,0,0,0.3);
    max-width:450px;
    margin:50px auto;
    text-align:center;
}
h1 {
    margin-bottom:20px;
    color:#333;
}
#dropArea {
    border:2px dashed #007bff;
    border-radius:12px;
    padding:20px;
    cursor:pointer;
    margin-bottom:15px;
    transition: background 0.3s, border-color 0.3s;
    color:#007bff;
    font-weight:bold;
}
#dropArea.hover {
    background:#e0f0ff;
    border-color:#0056b3;
}
input[type="number"], select {
    width:45%;
    padding:10px;
    margin:5px 2%;
    border-radius:5px;
    border:1px solid #ccc;
    text-align:center;
    font-size:16px;
}
img {
    max-width:100%;
    margin-top:15px;
    border-radius:8px;
    display:none;
    border:4px solid #00bfff; /* اطار سمائي */
    box-sizing:border-box;
    background: rgba(255,255,255,0); /* شفافية خلفية */
}
button {
    margin-top:10px;
    background-color:#007bff;
    color:#fff;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}
button:hover {
    background-color:#0056b3;
}
.footer{
    text-align:center;
    color:#fff;
    margin:30px 0 50px;
    font-size:14px;
}
.footer a{
    text-decoration:none;
    font-weight:bold;
    animation: colorChange 3s infinite alternate;
}
@keyframes colorChange {
    0% { color: white; }
    50% { color: #4CAF50; }
    100% { color: #00f; }
}
@media(max-width:500px){
    .resizer{
        width:90%;
        padding:20px;
    }
    input[type="number"], select{
        width:90%;
        margin:5px 0;
    }
}
</style>
</head>
<body>

<canvas id="starsCanvas"></canvas>

<div class="resizer">
    <h1>مغير أبعاد الصور</h1>
    <div id="dropArea">اسحب وأسقط الصورة هنا أو اضغط للاختيار</div>
    <input type="number" id="widthInput" placeholder="العرض (px)">
    <input type="number" id="heightInput" placeholder="الارتفاع (px)">
    <br>
    <select id="formatSelect">
        <option value="png">PNG</option>
        <option value="jpeg">JPEG</option>
        <option value="webp">WebP</option>
        <option value="bmp">BMP</option>
        <option value="gif">GIF</option>
    </select>
    <br>
    <button id="downloadBtn" style="display:none;">تحميل الصورة</button>
    <button id="resetBtn" style="display:none;">إعادة تعيين</button>
    <img id="outputImage" src="" alt="الصورة المعدلة">
</div>

<div class="footer">
    تم تطوير الموقع من قبل المطور <a href="https://t.me/Ali_3hme" target="_blank">عـــلـــي ¹</a>
</div>

<script>
// ------------ نجوم منتظمة ---------------
const canvas = document.getElementById('starsCanvas');
const ctx = canvas.getContext('2d');
let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;
window.addEventListener('resize', ()=>{ w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; });

// نجوم على شكل شبكة منتظمة
const stars=[];
const rows=10;
const cols=15;
for(let i=0;i<rows;i++){
    for(let j=0;j<cols;j++){
        stars.push({x: j*(w/cols)+Math.random()*20, y: i*(h/rows)+Math.random()*20, r: Math.random()*1.2+0.8});
    }
}

function drawStars(){
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle='#fff';
    stars.forEach(s=>{
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();
        // حركة خفيفة
        s.x += Math.sin(Date.now()*0.0002)*0.2;
        s.y += Math.cos(Date.now()*0.0002)*0.2;
        if(s.x>w)s.x=0;
        if(s.x<0)s.x=w;
        if(s.y>h)s.y=0;
        if(s.y<0)s.y=h;
    });
    requestAnimationFrame(drawStars);
}
drawStars();

// ------------ مغير أبعاد الصور ---------------
const dropArea=document.getElementById('dropArea');
const widthInput=document.getElementById('widthInput');
const heightInput=document.getElementById('heightInput');
const outputImage=document.getElementById('outputImage');
const resetBtn=document.getElementById('resetBtn');
const downloadBtn=document.getElementById('downloadBtn');
const formatSelect=document.getElementById('formatSelect');

let uploadedImage=null;

// رفع الصورة
dropArea.addEventListener('click', ()=>{
    const fileInput=document.createElement('input');
    fileInput.type='file';
    fileInput.accept='image/*';
    fileInput.onchange=()=>handleFile(fileInput.files[0]);
    fileInput.click();
});
dropArea.addEventListener('dragover', e=>{ e.preventDefault(); dropArea.classList.add('hover'); });
dropArea.addEventListener('dragleave', ()=>dropArea.classList.remove('hover'));
dropArea.addEventListener('drop', e=>{
    e.preventDefault();
    dropArea.classList.remove('hover');
    if(e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file){
    if(!file.type.startsWith('image/')){ alert('اختر صورة فقط'); return; }
    uploadedImage=new Image();
    const reader=new FileReader();
    reader.onload=function(e){
        uploadedImage.src=e.target.result;
        uploadedImage.onload=()=>{
            widthInput.value=uploadedImage.width;
            heightInput.value=uploadedImage.height;
            outputImage.src=uploadedImage.src;
            outputImage.style.display='block';
            dropArea.style.display='none';
            resetBtn.style.display='inline-block';
            downloadBtn.style.display='inline-block';
            updatePreview();
        }
    };
    reader.readAsDataURL(file);
}

// تحديث المعاينة عند تغيير الأبعاد أو الصيغة
function updatePreview(){
    if(!uploadedImage)return;
    const w=parseInt(widthInput.value);
    const h=parseInt(heightInput.value);
    if(!w||!h)return;
    const canvas=document.createElement('canvas');
    canvas.width=w;
    canvas.height=h;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,w,h);
    ctx.drawImage(uploadedImage,0,0,w,h);
    const format=formatSelect.value;
    const dataURL=canvas.toDataURL(`image/${format}`);
    outputImage.src=dataURL;
}

widthInput.addEventListener('input', updatePreview);
heightInput.addEventListener('input', updatePreview);
formatSelect.addEventListener('change', updatePreview);

// زر تحميل يدوي
downloadBtn.addEventListener('click', ()=>{
    const a=document.createElement('a');
    a.href=outputImage.src;
    a.download=`resized-image.${formatSelect.value}`;
    a.click();
});

// زر إعادة التعيين
resetBtn.addEventListener('click', ()=>{
    uploadedImage=null;
    outputImage.src='';
    outputImage.style.display='none';
    widthInput.value='';
    heightInput.value='';
    dropArea.style.display='block';
    resetBtn.style.display='none';
    downloadBtn.style.display='none';
});
</script>

</body>
</html>
