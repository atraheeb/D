<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Resizer Pro</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a0a23;
}

/* الكارد */
.resizer{
    background:#fff;
    padding:20px;
    border-radius:12px;
    max-width:400px;
    margin:40px auto;
    text-align:center;
}

/* الصورة */
.image-box{
    position:relative;
    display:none;
}

.image-box img{
    width:100%;
    border-radius:10px;
}

/* الاطار الشفاف */
.overlay{
    position:absolute;
    border:2px dashed red;
    background:rgba(255,0,0,0.1);
    pointer-events:none;
}

/* مدخلات */
input{
    width:90%;
    padding:8px;
    margin:5px 0;
}

/* ازرار */
button{
    padding:10px;
    margin-top:8px;
    width:90%;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

#apply{
    background:#00bfff;
    color:#fff;
}

#download{
    background:#4CAF50;
    color:#fff;
    display:none;
}

</style>
</head>

<body>

<div class="resizer">

<div class="image-box" id="box">
<img id="img">
<div class="overlay" id="overlay"></div>
</div>

<input type="file" id="file">

<input type="number" id="w" placeholder="العرض">
<input type="number" id="h" placeholder="الارتفاع">

<button id="apply">تطبيق الأبعاد</button>
<button id="download">تحميل</button>

</div>

<script>
let image=new Image();
let originalW,originalH;

const img=document.getElementById('img');
const overlay=document.getElementById('overlay');
const box=document.getElementById('box');

document.getElementById('file').onchange=e=>{
let file=e.target.files[0];
let r=new FileReader();
r.onload=x=>{
image.src=x.target.result;
image.onload=()=>{
originalW=image.width;
originalH=image.height;

img.src=image.src;
box.style.display="block";

document.getElementById('w').value=originalW;
document.getElementById('h').value=originalH;

updateOverlay();
}
}
r.readAsDataURL(file);
};

// رسم الاطار الشفاف فقط
function updateOverlay(){
let w=document.getElementById('w').value;
let h=document.getElementById('h').value;

let scale=img.clientWidth/originalW;

overlay.style.width=(w*scale)+"px";
overlay.style.height=(h*scale)+"px";
overlay.style.top="0";
overlay.style.left="0";
}

// تحديث فقط الاطار (بدون تغيير الصورة)
document.getElementById('w').oninput=updateOverlay;
document.getElementById('h').oninput=updateOverlay;

// تطبيق فعلي
document.getElementById('apply').onclick=()=>{
let w=document.getElementById('w').value;
let h=document.getElementById('h').value;

let canvas=document.createElement('canvas');
canvas.width=w;
canvas.height=h;
let ctx=canvas.getContext('2d');
ctx.drawImage(image,0,0,w,h);

img.src=canvas.toDataURL();

document.getElementById('download').style.display="block";
};

// تحميل
document.getElementById('download').onclick=()=>{
let a=document.createElement('a');
a.href=img.src;
a.download="image.png";
a.click();
};

</script>

</body>
</html>
