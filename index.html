<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مغير أبعاد الصور</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0a0a23;
    overflow-x:hidden;
}

/* النجوم */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* الكارد */
.resizer{
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,0.2);
    padding:25px;
    border-radius:15px;
    max-width:420px;
    margin:40px auto;
    text-align:center;
}

/* الصورة */
#outputImage{
    width:100%;
    border:4px solid #00bfff;
    border-radius:10px;
    display:none;
    margin-bottom:15px;
}

/* رفع */
#dropArea{
    border:2px dashed #00bfff;
    padding:20px;
    border-radius:10px;
    cursor:pointer;
    color:#00bfff;
    margin-bottom:10px;
}

/* مدخلات */
input,select{
    width:90%;
    padding:10px;
    margin:5px 0;
    border-radius:6px;
    border:none;
    text-align:center;
}

/* زر تحميل متغير */
#downloadBtn{
    background:linear-gradient(45deg,#00bfff,#00ff88);
    animation:grad 3s infinite alternate;
    color:#fff;
    border:none;
    padding:12px;
    width:90%;
    border-radius:8px;
    margin-top:10px;
}

@keyframes grad{
    0%{filter:hue-rotate(0deg);}
    100%{filter:hue-rotate(60deg);}
}

/* زر reset */
#resetBtn{
    background:#888;
    color:#fff;
    border:none;
    padding:6px 10px;
    border-radius:6px;
    font-size:12px;
    position:absolute;
    top:10px;
    left:10px;
}

/* footer */
.footer{
    text-align:center;
    color:#fff;
    margin-top:20px;
}

.footer a{
    animation:colorChange 3s infinite alternate;
    text-decoration:none;
}

@keyframes colorChange{
    0%{color:#fff;}
    50%{color:#4CAF50;}
    100%{color:#00f;}
}

/* موبايل */
@media(max-width:500px){
    .resizer{
        width:90%;
    }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="resizer">

<button id="resetBtn" style="display:none;">Reset</button>

<img id="outputImage">

<div id="dropArea">اضغط لاختيار صورة</div>

<input type="number" id="w" placeholder="العرض">
<input type="number" id="h" placeholder="الارتفاع">

<select id="format">
<option value="png">PNG</option>
<option value="jpeg">JPEG</option>
<option value="webp">WebP</option>
<option value="bmp">BMP</option>
<option value="gif">GIF</option>
</select>

<button id="downloadBtn" style="display:none;">تحميل</button>

</div>

<div class="footer">
تم تطوير الموقع من قبل المطور 
<a href="https://t.me/Ali_3hme" target="_blank">عـــلـــي ¹</a>
</div>

<script>
// النجوم (ثابتة مرتبة)
const c=document.getElementById('stars');
const ctx=c.getContext('2d');
function resize(){
c.width=window.innerWidth;
c.height=window.innerHeight;
}
resize();
window.onresize=resize;

let stars=[];
for(let i=0;i<120;i++){
stars.push({x:(i%20)*80,y:Math.floor(i/20)*80});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
ctx.fillStyle="#fff";
stars.forEach(s=>{
ctx.fillRect(s.x,s.y,2,2);
});
requestAnimationFrame(draw);
}
draw();

// الصور
let img=null;
const drop=document.getElementById('dropArea');
const out=document.getElementById('outputImage');
const w=document.getElementById('w');
const h=document.getElementById('h');
const format=document.getElementById('format');
const download=document.getElementById('downloadBtn');
const reset=document.getElementById('resetBtn');

drop.onclick=()=>{
let i=document.createElement('input');
i.type='file';
i.accept='image/*';
i.onchange=e=>load(e.target.files[0]);
i.click();
}

function load(file){
img=new Image();
let r=new FileReader();
r.onload=e=>{
img.src=e.target.result;
img.onload=()=>{
out.src=img.src;
out.style.display="block";
drop.style.display="none";
w.value=img.width;
h.value=img.height;
download.style.display="block";
reset.style.display="block";
update();
}
}
r.readAsDataURL(file);
}

function update(){
if(!img)return;
let canvas=document.createElement('canvas');
canvas.width=w.value;
canvas.height=h.value;
let ctx=canvas.getContext('2d');
ctx.drawImage(img,0,0,canvas.width,canvas.height);
out.src=canvas.toDataURL("image/"+format.value);
}

w.oninput=update;
h.oninput=update;
format.onchange=update;

download.onclick=()=>{
let a=document.createElement('a');
a.href=out.src;
a.download="image."+format.value;
a.click();
}

reset.onclick=()=>{
img=null;
out.style.display="none";
drop.style.display="block";
download.style.display="none";
reset.style.display="none";
}
</script>

</body>
</html>
